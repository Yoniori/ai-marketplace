# ─── Vibe Code Market — CrewAI Cloud project definition ─────────────────────
#
# This file satisfies the CrewAI Cloud deployer's expected project layout:
#
#   <repo-root>/
#     pyproject.toml        ← this file
#     uv.lock               ← generated by `uv lock`
#     src/vibe_crew/
#       __init__.py
#       crew.py             ← CrewAI's discovery entry point
#       main.py             ← CLI runner (registered under [project.scripts])
#
# The canonical source of the crew lives in `agents/` for local development.
# `src/vibe_crew/crew.py` is a thin shim that re-exports the VibeCrew class
# so the deployer finds it in the location it expects.
#
# NOTE: This pyproject.toml is read ONLY by the Python/CrewAI toolchain.
# It does not participate in the Next.js build. The Vercel Next.js preset
# detects the project via package.json and ignores Python metadata.

[project]
name = "vibe_crew"
version = "0.1.0"
description = "Vibe Code Market — agentic organization (CEO + 6 workers, Guardian-gated)"
readme = "agents/README.md"
requires-python = ">=3.10,<3.14"
authors = [{ name = "Vibe Code Market" }]
dependencies = [
    "crewai[tools]>=0.80.0,<0.100.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.0",
]

[project.scripts]
run_crew  = "vibe_crew.main:run"
vibe_crew = "vibe_crew.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vibe_crew"]

# The crew config YAMLs and the agents/ source directory must be bundled with
# the deploy so the shim can import them at runtime.
[tool.hatch.build]
include = [
    "src/vibe_crew/**/*.py",
    "agents/**/*.py",
    "agents/config/*.yaml",
    "agents/README.md",
]

[tool.crewai]
type = "crew"
